server {
    listen 80;
    server_name dash.qscuio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Public 443 is an Nginx stream/SNI proxy on this host.
    listen 127.0.0.1:8445 ssl http2;
    server_name dash.qscuio.com;

    ssl_certificate /etc/letsencrypt/live/dash.qscuio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dash.qscuio.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:qbot_dashboard:10m;
    ssl_session_timeout 1d;

    client_max_body_size 32k;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
    set $dashboard_cache_control "no-store";
    if ($request_uri ~* "^/dashboard/.+\.(?:css|js)\?v=[A-Za-z0-9._-]+$") {
        set $dashboard_cache_control "public, max-age=31536000, immutable";
    }

    add_header Cache-Control $dashboard_cache_control always;

    location = / {
        return 302 https://$host/dashboard/;
    }

    location = /dashboard {
        return 302 https://$host/dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location /api/dashboard/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
