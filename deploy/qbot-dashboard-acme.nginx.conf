# Temporary HTTP-only site used by GitHub Actions for the first ACME issuance.
server {
    listen 80;
    server_name dash.qscuio.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
